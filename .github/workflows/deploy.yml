name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY secret is missing"
            exit 1
          fi

          mkdir -p dist

          cp taskpane.html dist/
          cp manifest.xml dist/
          cp msal-browser.min.js dist/
          cp icon-16.png dist/
          cp icon-32.png dist/
          cp icon-80.png dist/

          if [ -f email-prioritizer-v1.html ]; then
            cp email-prioritizer-v1.html dist/
          fi

          touch dist/.nojekyll

          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path("dist/taskpane.html")
          text = path.read_text(encoding="utf-8")

          placeholder = "__GEMINI_API_KEY__"
          key = os.environ["GEMINI_API_KEY"]

          if placeholder not in text:
              raise SystemExit("Placeholder __GEMINI_API_KEY__ not found in taskpane.html")

          path.write_text(text.replace(placeholder, key), encoding="utf-8")
          PY

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment

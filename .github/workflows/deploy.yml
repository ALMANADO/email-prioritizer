name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site and inject Gemini key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY secret is missing"
            exit 1
          fi

          mkdir -p dist

          cp taskpane.html dist/
          cp manifest.xml dist/
          cp msal-browser.min.js dist/
          cp icon-16.png dist/
          cp icon-32.png dist/
          cp icon-80.png dist/

          if [ -f email-prioritizer-v1.html ]; then
            cp email-prioritizer-v1.html dist/
          fi

          touch dist/.nojekyll

          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path("dist/taskpane.html")
          text = path.read_text(encoding="utf-8")
          placeholder = "__GEMINI_API_KEY__"
          key = os.environ["GEMINI_API_KEY"]

          placeholder_count = text.count(placeholder)
          if placeholder_count != 1:
              raise SystemExit(
                  f"Expected exactly one Gemini placeholder, found {placeholder_count}"
              )

          text = text.replace(placeholder, key, 1)
          path.write_text(text, encoding="utf-8")
          PY

          if grep -q "__GEMINI_API_KEY__" dist/taskpane.html; then
            echo "Gemini key placeholder was not replaced"
            exit 1
          fi

          if ! grep -q "generativelanguage.googleapis.com" dist/taskpane.html; then
            echo "Gemini integration code is missing from deployed taskpane.html"
            exit 1
          fi

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment

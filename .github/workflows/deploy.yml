name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site and inject GroqCloud key
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$GROQ_API_KEY" ]; then
            echo "GROQ_API_KEY secret is missing"
            exit 1
          fi

          mkdir -p dist

          cp taskpane.html dist/
          cp manifest.xml dist/
          cp msal-browser.min.js dist/
          cp icon-16.png dist/
          cp icon-32.png dist/
          cp icon-80.png dist/

          if [ -f email-prioritizer-v1.html ]; then
            cp email-prioritizer-v1.html dist/
          fi

          touch dist/.nojekyll

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("dist/taskpane.html")
          text = path.read_text(encoding="utf-8")
          key = os.environ["GROQ_API_KEY"]
          target = 'const GROQ_API_KEY = "__GROQ_API_KEY__";'

          count = text.count(target)
          if count != 1:
              raise SystemExit(
                  f"Expected exactly one Groq key assignment, found {count}"
              )

          replacement = f"const GROQ_API_KEY = {json.dumps(key)};"
          text = text.replace(target, replacement, 1)
          path.write_text(text, encoding="utf-8")

          print("GroqCloud key injected into taskpane.html successfully")
          PY

          if grep -q "__GROQ_API_KEY__" dist/taskpane.html; then
            echo "GroqCloud key placeholder was not replaced"
            exit 1
          fi

          if ! grep -q "api.groq.com/openai/v1/chat/completions" dist/taskpane.html; then
            echo "GroqCloud integration code is missing from deployed taskpane.html"
            exit 1
          fi

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment

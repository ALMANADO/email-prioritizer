<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Prioritizer — Level 2</title>
<script src="./msal-browser.min.js"></script>
<style>
  :root {
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #e3e3e3;
    --bg: #fafafa;
    --accent: #2b5fd9;
    --accent-soft: #eef2fd;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    margin: 0;
    padding: 40px 24px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 14px; margin: 0 0 28px; }
  button {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 18px;
    border-radius: 6px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: white;
    cursor: pointer;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: default; }
  #status {
    font-size: 13px;
    color: var(--muted);
    margin-top: 14px;
    min-height: 18px;
  }
  #status.error { color: #b3261e; }
  #userbar {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--accent-soft);
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 13px;
  }
  #userbar button {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 5px 12px;
    font-size: 12px;
  }
  .email-list { margin-top: 20px; }
  .email-card {
    border: 1px solid var(--line);
    background: white;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .email-top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 6px;
  }
  .from { font-weight: 600; font-size: 14px; }
  .date { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .subject { font-size: 14px; margin-bottom: 4px; }
  .preview { font-size: 13px; color: var(--muted); line-height: 1.4; }
  #count { font-size: 13px; color: var(--muted); margin: 18px 0 4px; }

  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    margin-right: 8px;
    vertical-align: middle;
  }
  .tag-high { background: #fdeceb; color: #b3261e; }
  .tag-medium { background: #fff4e0; color: #9a6300; }
  .tag-low { background: #eef2fd; color: #2b5fd9; }

  .reason {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--line);
  }

  .settings {
    background: white;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 20px;
  }
  .settings label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .settings textarea {
    width: 100%;
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    resize: vertical;
    min-height: 44px;
  }
  .settings .hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }
  .settings-toggle {
    background: transparent;
    color: var(--accent);
    border: none;
    font-size: 12px;
    padding: 0;
    cursor: pointer;
    text-decoration: underline;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Email Prioritizer — Level 2</h1>
  <p class="sub">Ranked by sender, keywords, and time-sensitivity — highest priority first.</p>

  <div id="userbar">
    <span id="userlabel"></span>
    <button id="signOutBtn">Sign out</button>
  </div>

  <button id="signInBtn">Sign in with Microsoft</button>
  <div id="status"></div>

  <div class="settings" id="settingsBox" style="display:none;">
    <label for="keywordInput">Urgency keywords (comma-separated, edit anytime)</label>
    <textarea id="keywordInput"></textarea>
    <div class="hint">Matched against subject + preview text. <button class="settings-toggle" id="reRankBtn">Apply & re-rank</button></div>
  </div>

  <div id="count"></div>
  <div class="email-list" id="emailList"></div>
</div>

<script>
  // ---- 1. Configuration ----
  // Client ID from your Azure App Registration (Overview page)
  const msalConfig = {
    auth: {
      clientId: "869b49db-c5c5-4ce7-b10c-6e232f0f4905",
      authority: "https://login.microsoftonline.com/consumers", // personal Microsoft accounts
      redirectUri: window.location.href.split('?')[0].split('#')[0] // works for local file or hosted page
    },
    cache: {
      cacheLocation: "sessionStorage" // cleared when you close the tab — fine for a prototype
    }
  };

  const loginRequest = {
    scopes: ["User.Read", "Mail.Read"]
  };

  const msalInstance = new msal.PublicClientApplication(msalConfig);

  const signInBtn = document.getElementById("signInBtn");
  const signOutBtn = document.getElementById("signOutBtn");
  const statusEl = document.getElementById("status");
  const userbar = document.getElementById("userbar");
  const userlabel = document.getElementById("userlabel");
  const countEl = document.getElementById("count");
  const emailListEl = document.getElementById("emailList");
  const settingsBox = document.getElementById("settingsBox");
  const keywordInput = document.getElementById("keywordInput");
  const reRankBtn = document.getElementById("reRankBtn");

  const DEFAULT_KEYWORDS = "urgent, asap, action needed, action required, deadline, due today, due by, respond by, immediately, please review, time sensitive, escalation, follow up, reminder";
  keywordInput.value = DEFAULT_KEYWORDS;

  let currentAccount = null;
  let currentEmails = []; // raw emails from last fetch, so we can re-rank without re-fetching

  function setStatus(msg, isError) {
    statusEl.textContent = msg || "";
    statusEl.className = isError ? "error" : "";
  }

  // ---- 2. Sign in ----
  signInBtn.addEventListener("click", async () => {
    setStatus("Opening sign-in window...");
    signInBtn.disabled = true;
    try {
      const result = await msalInstance.loginPopup(loginRequest);
      msalInstance.setActiveAccount(result.account);
      onSignedIn(result.account);
    } catch (err) {
      setStatus("Sign-in failed: " + err.message, true);
      signInBtn.disabled = false;
    }
  });

  signOutBtn.addEventListener("click", () => {
    msalInstance.logoutPopup();
    userbar.style.display = "none";
    settingsBox.style.display = "none";
    signInBtn.style.display = "inline-block";
    signInBtn.disabled = false;
    emailListEl.innerHTML = "";
    countEl.textContent = "";
    currentEmails = [];
    currentAccount = null;
    setStatus("");
  });

  function onSignedIn(account) {
    currentAccount = account;
    signInBtn.style.display = "none";
    userbar.style.display = "flex";
    settingsBox.style.display = "block";
    userlabel.textContent = account.username;
    setStatus("Signed in. Fetching inbox...");
    fetchEmails(account);
  }

  // ---- 3. Fetch emails from Microsoft Graph ----
  async function fetchEmails(account) {
    try {
      const tokenResult = await msalInstance.acquireTokenSilent({
        scopes: loginRequest.scopes,
        account: account
      });

      const response = await fetch(
        "https://graph.microsoft.com/v1.0/me/messages?$top=15&$select=subject,from,receivedDateTime,bodyPreview&$orderby=receivedDateTime desc",
        {
          headers: {
            Authorization: "Bearer " + tokenResult.accessToken
          }
        }
      );

      if (!response.ok) {
        throw new Error("Graph API returned " + response.status);
      }

      const data = await response.json();
      currentEmails = data.value;
      renderRanked();
      setStatus("");
    } catch (err) {
      setStatus("Could not fetch emails: " + err.message, true);
    }
  }

  // ---- 4. Ranking logic ----
  function getKeywordList() {
    return keywordInput.value
      .split(",")
      .map(k => k.trim().toLowerCase())
      .filter(k => k.length > 0);
  }

  function scoreEmail(email, myDomain, keywords) {
    let score = 0;
    const reasons = [];

    // Signal 1: sender domain match
    const senderEmail = email.from?.emailAddress?.address || "";
    const senderDomain = senderEmail.split("@")[1]?.toLowerCase();
    if (senderDomain && myDomain && senderDomain === myDomain) {
      score += 30;
      reasons.push("Same domain as you");
    }

    // Signal 2: keyword match in subject + preview
    const haystack = ((email.subject || "") + " " + (email.bodyPreview || "")).toLowerCase();
    const matchedKeywords = keywords.filter(k => haystack.includes(k));
    if (matchedKeywords.length > 0) {
      score += Math.min(matchedKeywords.length * 15, 40); // cap contribution
      reasons.push(`Contains "${matchedKeywords[0]}"`);
    }

    // Signal 3: recency (decays over 7 days)
    const receivedDate = new Date(email.receivedDateTime);
    const hoursAgo = (Date.now() - receivedDate.getTime()) / (1000 * 60 * 60);
    if (hoursAgo <= 24) {
      score += 20;
      reasons.push("Received in the last 24h");
    } else if (hoursAgo <= 72) {
      score += 10;
    } else if (hoursAgo <= 168) {
      score += 3;
    }

    // Signal 4: simple date-mention detection (today/tomorrow/explicit dates)
    const dateFlagPattern = /\b(today|tomorrow|tonight|this (morning|afternoon|evening))\b|\b\d{1,2}(st|nd|rd|th)?[\/\-\s](jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)/i;
    if (dateFlagPattern.test(email.subject || "") || dateFlagPattern.test(email.bodyPreview || "")) {
      score += 15;
      reasons.push("Mentions a near-term date");
    }

    return { score, reasons };
  }

  function scoreToTag(score) {
    if (score >= 45) return { label: "High", cls: "tag-high" };
    if (score >= 20) return { label: "Medium", cls: "tag-medium" };
    return { label: "Low", cls: "tag-low" };
  }

  function renderRanked() {
    const myDomain = (currentAccount?.username || "").split("@")[1]?.toLowerCase();
    const keywords = getKeywordList();

    const scored = currentEmails.map(email => {
      const { score, reasons } = scoreEmail(email, myDomain, keywords);
      return { email, score, reasons };
    });

    scored.sort((a, b) => b.score - a.score);
    renderEmails(scored);
  }

  reRankBtn.addEventListener("click", (e) => {
    e.preventDefault();
    renderRanked();
  });

  // ---- 5. Render (ranked, with tag + reason) ----
  function renderEmails(scoredItems) {
    countEl.textContent = scoredItems.length + " emails, ranked by priority";
    emailListEl.innerHTML = "";

    scoredItems.forEach(({ email, score, reasons }) => {
      const card = document.createElement("div");
      card.className = "email-card";

      const fromName = email.from?.emailAddress?.name || "Unknown sender";
      const dateStr = new Date(email.receivedDateTime).toLocaleString();
      const tag = scoreToTag(score);
      const reasonText = reasons.length > 0 ? reasons.join(" • ") : "No strong priority signals";

      card.innerHTML = `
        <div class="email-top">
          <span><span class="tag ${tag.cls}">${tag.label}</span><span class="from">${escapeHtml(fromName)}</span></span>
          <span class="date">${dateStr}</span>
        </div>
        <div class="subject">${escapeHtml(email.subject || "(no subject)")}</div>
        <div class="preview">${escapeHtml(email.bodyPreview || "")}</div>
        <div class="reason">${escapeHtml(reasonText)}</div>
      `;
      emailListEl.appendChild(card);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // ---- 5. Restore session if already signed in ----
  window.addEventListener("load", () => {
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      msalInstance.setActiveAccount(accounts[0]);
      onSignedIn(accounts[0]);
    }
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Prioritizer — Level 1</title>
<script src="./msal-browser.min.js"></script>
<style>
  :root {
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #e3e3e3;
    --bg: #fafafa;
    --accent: #2b5fd9;
    --accent-soft: #eef2fd;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    margin: 0;
    padding: 40px 24px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 14px; margin: 0 0 28px; }
  button {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 18px;
    border-radius: 6px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: white;
    cursor: pointer;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: default; }
  #status {
    font-size: 13px;
    color: var(--muted);
    margin-top: 14px;
    min-height: 18px;
  }
  #status.error { color: #b3261e; }
  #userbar {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--accent-soft);
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 13px;
  }
  #userbar button {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 5px 12px;
    font-size: 12px;
  }
  .email-list { margin-top: 20px; }
  .email-card {
    border: 1px solid var(--line);
    background: white;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .email-top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 6px;
  }
  .from { font-weight: 600; font-size: 14px; }
  .date { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .subject { font-size: 14px; margin-bottom: 4px; }
  .preview { font-size: 13px; color: var(--muted); line-height: 1.4; }
  #count { font-size: 13px; color: var(--muted); margin: 18px 0 4px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Email Prioritizer — Level 1</h1>
  <p class="sub">Step 1: sign in and pull your inbox. No ranking yet — just proving the connection works.</p>

  <div id="userbar">
    <span id="userlabel"></span>
    <button id="signOutBtn">Sign out</button>
  </div>

  <button id="signInBtn">Sign in with Microsoft</button>
  <div id="status"></div>

  <div id="count"></div>
  <div class="email-list" id="emailList"></div>
</div>

<script>
  // ---- 1. Configuration ----
  // Client ID from your Azure App Registration (Overview page)
  const msalConfig = {
    auth: {
      clientId: "869b49db-c5c5-4ce7-b10c-6e232f0f4905",
      authority: "https://login.microsoftonline.com/consumers", // personal Microsoft accounts
      redirectUri: window.location.href.split('?')[0].split('#')[0] // works for local file or hosted page
    },
    cache: {
      cacheLocation: "sessionStorage" // cleared when you close the tab — fine for a prototype
    }
  };

  const loginRequest = {
    scopes: ["User.Read", "Mail.Read"]
  };

  const msalInstance = new msal.PublicClientApplication(msalConfig);

  const signInBtn = document.getElementById("signInBtn");
  const signOutBtn = document.getElementById("signOutBtn");
  const statusEl = document.getElementById("status");
  const userbar = document.getElementById("userbar");
  const userlabel = document.getElementById("userlabel");
  const countEl = document.getElementById("count");
  const emailListEl = document.getElementById("emailList");

  function setStatus(msg, isError) {
    statusEl.textContent = msg || "";
    statusEl.className = isError ? "error" : "";
  }

  // ---- 2. Sign in ----
  signInBtn.addEventListener("click", async () => {
    setStatus("Opening sign-in window...");
    signInBtn.disabled = true;
    try {
      const result = await msalInstance.loginPopup(loginRequest);
      msalInstance.setActiveAccount(result.account);
      onSignedIn(result.account);
    } catch (err) {
      setStatus("Sign-in failed: " + err.message, true);
      signInBtn.disabled = false;
    }
  });

  signOutBtn.addEventListener("click", () => {
    msalInstance.logoutPopup();
    userbar.style.display = "none";
    signInBtn.style.display = "inline-block";
    signInBtn.disabled = false;
    emailListEl.innerHTML = "";
    countEl.textContent = "";
    setStatus("");
  });

  function onSignedIn(account) {
    signInBtn.style.display = "none";
    userbar.style.display = "flex";
    userlabel.textContent = account.username;
    setStatus("Signed in. Fetching inbox...");
    fetchEmails(account);
  }

  // ---- 3. Fetch emails from Microsoft Graph ----
  async function fetchEmails(account) {
    try {
      const tokenResult = await msalInstance.acquireTokenSilent({
        scopes: loginRequest.scopes,
        account: account
      });

      const response = await fetch(
        "https://graph.microsoft.com/v1.0/me/messages?$top=15&$select=subject,from,receivedDateTime,bodyPreview&$orderby=receivedDateTime desc",
        {
          headers: {
            Authorization: "Bearer " + tokenResult.accessToken
          }
        }
      );

      if (!response.ok) {
        throw new Error("Graph API returned " + response.status);
      }

      const data = await response.json();
      renderEmails(data.value);
      setStatus("");
    } catch (err) {
      setStatus("Could not fetch emails: " + err.message, true);
    }
  }

  // ---- 4. Render (raw list, no ranking yet) ----
  function renderEmails(emails) {
    countEl.textContent = emails.length + " most recent emails";
    emailListEl.innerHTML = "";

    emails.forEach(email => {
      const card = document.createElement("div");
      card.className = "email-card";

      const fromName = email.from?.emailAddress?.name || "Unknown sender";
      const dateStr = new Date(email.receivedDateTime).toLocaleString();

      card.innerHTML = `
        <div class="email-top">
          <span class="from">${escapeHtml(fromName)}</span>
          <span class="date">${dateStr}</span>
        </div>
        <div class="subject">${escapeHtml(email.subject || "(no subject)")}</div>
        <div class="preview">${escapeHtml(email.bodyPreview || "")}</div>
      `;
      emailListEl.appendChild(card);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // ---- 5. Restore session if already signed in ----
  window.addEventListener("load", () => {
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      msalInstance.setActiveAccount(accounts[0]);
      onSignedIn(accounts[0]);
    }
  });
</script>
</body>
</html>

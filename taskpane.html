<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Prioritizer</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script src="./msal-browser.min.js"></script>
<style>
  :root {
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #e3e3e3;
    --bg: #fafafa;
    --accent: #2b5fd9;
    --accent-soft: #eef2fd;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    margin: 0;
    padding: 16px 14px;
    font-size: 13px;
  }
  .wrap { max-width: 100%; }
  h1 { font-size: 16px; margin: 0 0 3px; }
  .sub { color: var(--muted); font-size: 12px; margin: 0 0 16px; line-height: 1.4; }
  button {
    font-family: inherit;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 6px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: white;
    cursor: pointer;
    width: 100%;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: default; }
  #status {
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
    min-height: 16px;
  }
  #status.error { color: #b3261e; }
  #userbar {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    background: var(--accent-soft);
    border-radius: 8px;
    margin-bottom: 14px;
    font-size: 11px;
    gap: 8px;
  }
  #userlabel { word-break: break-all; }
  #userbar button {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 10px;
    font-size: 11px;
    width: auto;
    white-space: nowrap;
  }
  .email-list { margin-top: 14px; }
  .email-card {
    border: 1px solid var(--line);
    background: white;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .email-top {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 5px;
  }
  .email-top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
  }
  .from { font-weight: 600; font-size: 12px; }
  .date { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .subject { font-size: 12px; margin-bottom: 3px; font-weight: 500; }
  .preview { font-size: 11px; color: var(--muted); line-height: 1.4; }
  #count { font-size: 11px; color: var(--muted); margin: 14px 0 4px; }
  .tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .tag-high   { background: #fdeceb; color: #b3261e; }
  .tag-medium { background: #fff4e0; color: #9a6300; }
  .tag-low    { background: #eef2fd; color: #2b5fd9; }
  .reason {
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--line);
    line-height: 1.4;
  }
  .ai-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 3px;
    background: #f0ebff;
    color: #6d28d9;
    margin-left: 5px;
    vertical-align: middle;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Email Prioritizer <span class="ai-badge">AI</span></h1>
  <p class="sub">Ranked by AI urgency analysis &amp; time-sensitivity — highest priority first.</p>

  <div id="userbar">
    <span id="userlabel"></span>
    <button id="signOutBtn">Sign out</button>
  </div>

  <button id="signInBtn">Sign in with Microsoft</button>
  <div id="status"></div>

  <div id="count"></div>
  <div class="email-list" id="emailList"></div>
</div>

<script>
  console.log("almanado-debug: script tag reached, before Office.onReady");

  Office.onReady((info) => {
    console.log("almanado-debug: Office.onReady FIRED", info);
    initApp();
  });

  console.log("almanado-debug: Office.onReady call registered, waiting for callback");

  function initApp() {
    // ---- 1. Configuration ----
    const GEMINI_API_KEY = "AQ.Ab8RN6KibwmknRuAo0qi4v6aKviWXS5NxJzoYxHtv2FUQQjxMA";
    const GEMINI_URL     = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;

    const msalConfig = {
      auth: {
        clientId: "869b49db-c5c5-4ce7-b10c-6e232f0f4905",
        authority: "https://login.microsoftonline.com/consumers",
        redirectUri: "https://almanado.github.io/email-prioritizer/taskpane.html"
      },
      cache: { cacheLocation: "sessionStorage" }
    };

    const loginRequest = { scopes: ["User.Read", "Mail.ReadWrite", "MailboxSettings.ReadWrite"] };
    const msalInstance = new msal.PublicClientApplication(msalConfig);

    const signInBtn   = document.getElementById("signInBtn");
    const signOutBtn  = document.getElementById("signOutBtn");
    const statusEl    = document.getElementById("status");
    const userbar     = document.getElementById("userbar");
    const userlabel   = document.getElementById("userlabel");
    const countEl     = document.getElementById("count");
    const emailListEl = document.getElementById("emailList");

    let currentAccount = null;
    let currentEmails  = [];

    function setStatus(msg, isError) {
      statusEl.textContent = msg || "";
      statusEl.className   = isError ? "error" : "";
    }

    // ---- 2. Sign in ----
    signInBtn.addEventListener("click", async () => {
      setStatus("Opening sign-in window...");
      signInBtn.disabled = true;
      try {
        const result = await msalInstance.loginPopup(loginRequest);
        msalInstance.setActiveAccount(result.account);
        onSignedIn(result.account);
      } catch (err) {
        setStatus("Sign-in failed: " + err.message, true);
        signInBtn.disabled = false;
      }
    });

    signOutBtn.addEventListener("click", () => {
      msalInstance.logoutPopup();
      userbar.style.display   = "none";
      signInBtn.style.display = "block";
      signInBtn.disabled      = false;
      emailListEl.innerHTML   = "";
      countEl.textContent     = "";
      currentEmails           = [];
      currentAccount          = null;
      setStatus("");
    });

    function onSignedIn(account) {
      currentAccount          = account;
      signInBtn.style.display = "none";
      userbar.style.display   = "flex";
      userlabel.textContent   = account.username;
      setStatus("Signed in. Fetching inbox...");
      fetchEmails(account);
    }

    // ---- 3. Fetch emails ----
    async function fetchEmails(account) {
      try {
        const tokenResult = await msalInstance.acquireTokenSilent({
          scopes: loginRequest.scopes,
          account: account
        });

        const response = await fetch(
          "https://graph.microsoft.com/v1.0/me/messages?$top=50&$select=id,subject,from,receivedDateTime,bodyPreview,conversationId&$orderby=receivedDateTime desc",
          { headers: { Authorization: "Bearer " + tokenResult.accessToken } }
        );
        if (!response.ok) throw new Error("Graph API returned " + response.status);

        const data = await response.json();
        currentEmails = groupByThread(data.value).slice(0, 15);

        setStatus("Analysing urgency with AI...");
        const aiScores = await getAIScores(currentEmails);

        setStatus("Applying priority labels to your inbox...");
        await ensureCategoriesExist(tokenResult.accessToken);
        await applyCategoriesToEmails(tokenResult.accessToken, aiScores);

        renderEmails(currentEmails, aiScores);
        setStatus("");
      } catch (err) {
        setStatus("Error: " + err.message, true);
      }
    }

    // One representative message per thread (newest = first seen)
    function groupByThread(messages) {
      const seen = new Map();
      for (const msg of messages) {
        if (!seen.has(msg.conversationId)) seen.set(msg.conversationId, msg);
      }
      return Array.from(seen.values());
    }

    // ---- 4. Gemini AI scoring — single batch call ----
    async function getAIScores(emails) {
      const emailList = emails.map((e, i) => {
        const subject = e.subject || "(no subject)";
        const preview = e.bodyPreview || "";
        const hoursAgo = Math.round((Date.now() - new Date(e.receivedDateTime).getTime()) / (1000 * 60 * 60));
        return `${i}. Subject: "${subject}" | Preview: "${preview}" | Received: ${hoursAgo}h ago`;
      }).join("\n");

      const prompt = `You are an email urgency classifier. Analyse each email below and return ONLY a JSON array — no markdown, no explanation, no backticks.

Each item must have:
- "index": the number from the list (integer)
- "level": exactly one of "High", "Medium", or "Low"
- "reason": one short sentence (max 12 words) explaining why

Rules:
- High: requires prompt action, has a deadline, escalation, or time-critical ask
- Medium: informational but relevant, mild follow-up needed, or moderately recent
- Low: newsletters, notifications, FYI, no action needed

Emails:
${emailList}`;

      try {
        const resp = await fetch(GEMINI_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.1 }
          })
        });

        if (!resp.ok) throw new Error("Gemini API returned " + resp.status);
        const data = await resp.json();
        const raw  = data.candidates?.[0]?.content?.parts?.[0]?.text || "[]";
        const clean = raw.replace(/```json|```/g, "").trim();
        const parsed = JSON.parse(clean);

        // Build a map: index → { level, reason }
        const scoreMap = {};
        for (const item of parsed) {
          scoreMap[item.index] = { level: item.level, reason: item.reason };
        }
        return scoreMap;
      } catch (err) {
        console.warn("Gemini scoring failed, falling back to recency:", err.message);
        // Fallback: score by recency only
        const fallback = {};
        emails.forEach((e, i) => {
          const h = (Date.now() - new Date(e.receivedDateTime).getTime()) / (1000 * 60 * 60);
          fallback[i] = {
            level:  h <= 24 ? "High" : h <= 72 ? "Medium" : "Low",
            reason: h <= 24 ? "Received recently — no AI score available" : "Older email — no AI score available"
          };
        });
        return fallback;
      }
    }

    // ---- 5. Category setup ----
    const CATEGORY_NAMES = {
      High:   "Priority: High",
      Medium: "Priority: Medium",
      Low:    "Priority: Low"
    };
    const CATEGORY_COLORS = {
  "Priority: High":   "preset0",
  "Priority: Medium": "preset3",
  "Priority: Low":    "preset7"
};

    async function ensureCategoriesExist(accessToken) {
      try {
        const listResp = await fetch(
          "https://graph.microsoft.com/v1.0/me/outlook/masterCategories",
          { headers: { Authorization: "Bearer " + accessToken } }
        );
        if (!listResp.ok) throw new Error("Could not list categories");
        const listData = await listResp.json();

        for (const cat of listData.value) {
          if (cat.displayName.startsWith("Priority:")) {
            await fetch(
              `https://graph.microsoft.com/v1.0/me/outlook/masterCategories/${cat.id}`,
              { method: "DELETE", headers: { Authorization: "Bearer " + accessToken } }
            );
          }
        }
        for (const [, name] of Object.entries(CATEGORY_NAMES)) {
          await fetch("https://graph.microsoft.com/v1.0/me/outlook/masterCategories", {
            method: "POST",
            headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
            body: JSON.stringify({ displayName: name, color: CATEGORY_COLORS[name] })
          });
        }
      } catch (err) {
        console.warn("Category setup issue:", err.message);
      }
    }

    async function applyCategoriesToEmails(accessToken, aiScores) {
      for (let i = 0; i < currentEmails.length; i++) {
        const email        = currentEmails[i];
        const level        = aiScores[i]?.level || "Low";
        const categoryName = CATEGORY_NAMES[level];
        try {
          const convResp = await fetch(
            `https://graph.microsoft.com/v1.0/me/messages?$filter=conversationId eq '${email.conversationId}'&$select=id`,
            { headers: { Authorization: "Bearer " + accessToken } }
          );
          if (!convResp.ok) throw new Error("conv fetch failed");
          const convData = await convResp.json();
          for (const msg of convData.value) {
            await fetch(`https://graph.microsoft.com/v1.0/me/messages/${msg.id}`, {
              method: "PATCH",
              headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
              body: JSON.stringify({ categories: [categoryName] })
            });
          }
        } catch (err) {
          console.warn("Could not set category for thread:", err.message);
        }
      }
    }

    // ---- 6. Render ----
    function levelToTag(level) {
      if (level === "High")   return { label: "High",   cls: "tag-high"   };
      if (level === "Medium") return { label: "Medium", cls: "tag-medium" };
      return                         { label: "Low",    cls: "tag-low"    };
    }

    function renderEmails(emails, aiScores) {
      // Sort by level: High → Medium → Low
      const order = { High: 0, Medium: 1, Low: 2 };
      const sorted = emails.map((email, i) => ({ email, i, score: aiScores[i] }))
        .sort((a, b) => (order[a.score?.level] ?? 2) - (order[b.score?.level] ?? 2));

      countEl.textContent   = sorted.length + " threads, ranked by AI priority";
      emailListEl.innerHTML = "";

      sorted.forEach(({ email, score }) => {
        const card     = document.createElement("div");
        card.className = "email-card";

        const fromName   = email.from?.emailAddress?.name || "Unknown sender";
        const dateStr    = new Date(email.receivedDateTime).toLocaleDateString(undefined, { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
        const tag        = levelToTag(score?.level || "Low");
        const reasonText = score?.reason || "No urgency signals detected";

        card.innerHTML = `
          <div class="email-top">
            <div class="email-top-row">
              <span class="tag ${tag.cls}">${tag.label}</span>
              <span class="date">${dateStr}</span>
            </div>
            <span class="from">${escapeHtml(fromName)}</span>
          </div>
          <div class="subject">${escapeHtml(email.subject || "(no subject)")}</div>
          <div class="preview">${escapeHtml(email.bodyPreview || "")}</div>
          <div class="reason">${escapeHtml(reasonText)}</div>
        `;
        emailListEl.appendChild(card);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    // ---- 7. Restore session ----
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      msalInstance.setActiveAccount(accounts[0]);
      onSignedIn(accounts[0]);
    }
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Prioritizer</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script src="./msal-browser.min.js"></script>
<style>
  :root {
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #e3e3e3;
    --bg: #fafafa;
    --accent: #2b5fd9;
    --accent-soft: #eef2fd;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
  }
  body {
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    margin: 0;
    padding: 16px 14px;
    font-size: 13px;
  }
  .wrap { max-width: 100%; }
  h1 { font-size: 16px; margin: 0 0 3px; }
  .sub { color: var(--muted); font-size: 12px; margin: 0 0 16px; line-height: 1.4; }
  button {
    font-family: inherit;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 6px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: white;
    cursor: pointer;
    width: 100%;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: default; }
  #status {
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
    min-height: 16px;
  }
  #status.error { color: #b3261e; }
  #userbar {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    background: var(--accent-soft);
    border-radius: 8px;
    margin-bottom: 14px;
    font-size: 11px;
    gap: 8px;
  }
  #userlabel { word-break: break-all; }
  #userbar button {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 10px;
    font-size: 11px;
    width: auto;
    white-space: nowrap;
  }
  .email-list { margin-top: 14px; }
  .email-card {
    border: 1px solid var(--line);
    background: white;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .email-top {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 5px;
  }
  .email-top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
  }
  .from { font-weight: 600; font-size: 12px; }
  .date { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .subject { font-size: 12px; margin-bottom: 3px; font-weight: 500; }
  .preview { font-size: 11px; color: var(--muted); line-height: 1.4; }
  #count { font-size: 11px; color: var(--muted); margin: 14px 0 4px; }

  .tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .tag-high { background: #fdeceb; color: #b3261e; }
  .tag-medium { background: #fff4e0; color: #9a6300; }
  .tag-low { background: #eef2fd; color: #2b5fd9; }

  .reason {
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed var(--line);
    line-height: 1.4;
  }

  .settings {
    background: white;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 14px;
  }
  .settings label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .settings textarea {
    width: 100%;
    font-family: inherit;
    font-size: 12px;
    padding: 6px 8px;
    border: 1px solid var(--line);
    border-radius: 6px;
    resize: vertical;
    min-height: 50px;
  }
  .settings .hint {
    font-size: 10px;
    color: var(--muted);
    margin-top: 5px;
    line-height: 1.4;
  }
  .settings-toggle {
    background: transparent;
    color: var(--accent);
    border: none;
    font-size: 10px;
    padding: 0;
    cursor: pointer;
    text-decoration: underline;
    width: auto;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Email Prioritizer</h1>
  <p class="sub">Ranked by keywords &amp; time-sensitivity — highest priority first.</p>

  <div id="userbar">
    <span id="userlabel"></span>
    <button id="signOutBtn">Sign out</button>
  </div>

  <button id="signInBtn">Sign in with Microsoft</button>
  <div id="status"></div>

  <div class="settings" id="settingsBox" style="display:none;">
    <label for="keywordInput">Urgency keywords (edit anytime)</label>
    <textarea id="keywordInput"></textarea>
    <div class="hint">Matched against subject + preview. <button class="settings-toggle" id="reRankBtn">Apply &amp; re-rank</button></div>
  </div>

  <div id="count"></div>
  <div class="email-list" id="emailList"></div>
</div>

<script>
  console.log("almanado-debug: script tag reached, before Office.onReady");

  // Wait for Office to be ready before touching MSAL/UI, as required inside a task pane.
  Office.onReady((info) => {
    console.log("almanado-debug: Office.onReady FIRED", info);
    initApp();
  });

  console.log("almanado-debug: Office.onReady call registered, waiting for callback");

  function initApp() {
    // ---- 1. Configuration ----
    const msalConfig = {
      auth: {
        clientId: "869b49db-c5c5-4ce7-b10c-6e232f0f4905",
        authority: "https://login.microsoftonline.com/consumers", // personal Microsoft accounts
        redirectUri: "https://almanado.github.io/email-prioritizer/taskpane.html"
      },
      cache: {
        cacheLocation: "sessionStorage"
      }
    };

    const loginRequest = {
      scopes: ["User.Read", "Mail.ReadWrite"]
    };

    const msalInstance = new msal.PublicClientApplication(msalConfig);

    const signInBtn = document.getElementById("signInBtn");
    const signOutBtn = document.getElementById("signOutBtn");
    const statusEl = document.getElementById("status");
    const userbar = document.getElementById("userbar");
    const userlabel = document.getElementById("userlabel");
    const countEl = document.getElementById("count");
    const emailListEl = document.getElementById("emailList");
    const settingsBox = document.getElementById("settingsBox");
    const keywordInput = document.getElementById("keywordInput");
    const reRankBtn = document.getElementById("reRankBtn");

    const DEFAULT_KEYWORDS = "urgent, asap, action needed, action required, deadline, due today, due by, respond by, immediately, please review, time sensitive, escalation, follow up, reminder";
    keywordInput.value = DEFAULT_KEYWORDS;

    let currentAccount = null;
    let currentEmails = [];

    function setStatus(msg, isError) {
      statusEl.textContent = msg || "";
      statusEl.className = isError ? "error" : "";
    }

    // ---- 2. Sign in ----
    signInBtn.addEventListener("click", async () => {
      setStatus("Opening sign-in window...");
      signInBtn.disabled = true;
      try {
        const result = await msalInstance.loginPopup(loginRequest);
        msalInstance.setActiveAccount(result.account);
        onSignedIn(result.account);
      } catch (err) {
        setStatus("Sign-in failed: " + err.message, true);
        signInBtn.disabled = false;
      }
    });

    signOutBtn.addEventListener("click", () => {
      msalInstance.logoutPopup();
      userbar.style.display = "none";
      settingsBox.style.display = "none";
      signInBtn.style.display = "block";
      signInBtn.disabled = false;
      emailListEl.innerHTML = "";
      countEl.textContent = "";
      currentEmails = [];
      currentAccount = null;
      setStatus("");
    });

    function onSignedIn(account) {
      currentAccount = account;
      signInBtn.style.display = "none";
      userbar.style.display = "flex";
      settingsBox.style.display = "block";
      userlabel.textContent = account.username;
      setStatus("Signed in. Fetching inbox...");
      fetchEmails(account);
    }

    // ---- 3. Fetch emails from Microsoft Graph ----
    async function fetchEmails(account) {
      try {
        const tokenResult = await msalInstance.acquireTokenSilent({
          scopes: loginRequest.scopes,
          account: account
        });

        const response = await fetch(
          "https://graph.microsoft.com/v1.0/me/messages?$top=15&$select=id,subject,from,receivedDateTime,bodyPreview&$orderby=receivedDateTime desc",
          {
            headers: {
              Authorization: "Bearer " + tokenResult.accessToken
            }
          }
        );

        if (!response.ok) {
          throw new Error("Graph API returned " + response.status);
        }

        const data = await response.json();
        currentEmails = data.value;
        renderRanked();
        setStatus("Applying priority labels to your inbox...");
        await ensureCategoriesExist(tokenResult.accessToken);
        await applyCategoriesToEmails(tokenResult.accessToken);
        setStatus("");
      } catch (err) {
        setStatus("Could not fetch emails: " + err.message, true);
      }
    }

    // ---- 3b. Category setup and application ----
    const CATEGORY_NAMES = {
      High: "Priority: High",
      Medium: "Priority: Medium",
      Low: "Priority: Low"
    };
    const CATEGORY_COLORS = {
      "Priority: High": "preset0",   // red
      "Priority: Medium": "preset3", // yellow
      "Priority: Low": "preset7"     // blue
    };

    let categoriesEnsured = false;

    async function ensureCategoriesExist(accessToken) {
      if (categoriesEnsured) return; // only need to do this once per session
      try {
        const listResp = await fetch("https://graph.microsoft.com/v1.0/me/outlook/masterCategories", {
          headers: { Authorization: "Bearer " + accessToken }
        });
        if (!listResp.ok) throw new Error("Could not list categories");
        const listData = await listResp.json();
        const existingNames = new Set(listData.value.map(c => c.displayName));

        for (const [label, name] of Object.entries(CATEGORY_NAMES)) {
          if (!existingNames.has(name)) {
            await fetch("https://graph.microsoft.com/v1.0/me/outlook/masterCategories", {
              method: "POST",
              headers: {
                Authorization: "Bearer " + accessToken,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({ displayName: name, color: CATEGORY_COLORS[name] })
            });
          }
        }
        categoriesEnsured = true;
      } catch (err) {
        // Non-fatal: if category setup fails, we still show the sidebar ranking.
        console.warn("Category setup issue:", err.message);
      }
    }

    async function applyCategoriesToEmails(accessToken) {
      const keywords = getKeywordList();
      for (const email of currentEmails) {
        const { score } = scoreEmail(email, keywords);
        const tag = scoreToTag(score);
        const categoryName = CATEGORY_NAMES[tag.label];
        try {
          await fetch(`https://graph.microsoft.com/v1.0/me/messages/${email.id}`, {
            method: "PATCH",
            headers: {
              Authorization: "Bearer " + accessToken,
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ categories: [categoryName] })
          });
        } catch (err) {
          console.warn("Could not set category for one email:", err.message);
        }
      }
    }

    // ---- 4. Ranking logic ----
    function getKeywordList() {
      return keywordInput.value
        .split(",")
        .map(k => k.trim().toLowerCase())
        .filter(k => k.length > 0);
    }

    function scoreEmail(email, keywords) {
      let score = 0;
      const reasons = [];

      const haystack = ((email.subject || "") + " " + (email.bodyPreview || "")).toLowerCase();
      const matchedKeywords = keywords.filter(k => haystack.includes(k));
      if (matchedKeywords.length > 0) {
        score += Math.min(matchedKeywords.length * 15, 40);
        reasons.push(`Contains "${matchedKeywords[0]}"`);
      }

      const receivedDate = new Date(email.receivedDateTime);
      const hoursAgo = (Date.now() - receivedDate.getTime()) / (1000 * 60 * 60);
      if (hoursAgo <= 24) {
        score += 20;
        reasons.push("Received in the last 24h");
      } else if (hoursAgo <= 72) {
        score += 10;
      } else if (hoursAgo <= 168) {
        score += 3;
      }

      const dateFlagPattern = /\b(today|tomorrow|tonight|this (morning|afternoon|evening))\b|\b\d{1,2}(st|nd|rd|th)?[\/\-\s](jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)/i;
      if (dateFlagPattern.test(email.subject || "") || dateFlagPattern.test(email.bodyPreview || "")) {
        score += 15;
        reasons.push("Mentions a near-term date");
      }

      return { score, reasons };
    }

    function scoreToTag(score) {
      if (score >= 35) return { label: "High", cls: "tag-high" };
      if (score >= 15) return { label: "Medium", cls: "tag-medium" };
      return { label: "Low", cls: "tag-low" };
    }

    function renderRanked() {
      const keywords = getKeywordList();

      const scored = currentEmails.map(email => {
        const { score, reasons } = scoreEmail(email, keywords);
        return { email, score, reasons };
      });

      scored.sort((a, b) => b.score - a.score);
      renderEmails(scored);
    }

    reRankBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      renderRanked();
      try {
        const tokenResult = await msalInstance.acquireTokenSilent({
          scopes: loginRequest.scopes,
          account: currentAccount
        });
        setStatus("Updating priority labels...");
        await applyCategoriesToEmails(tokenResult.accessToken);
        setStatus("");
      } catch (err) {
        setStatus("Re-ranked, but couldn't update Outlook labels: " + err.message, true);
      }
    });

    // ---- 5. Render ----
    function renderEmails(scoredItems) {
      countEl.textContent = scoredItems.length + " emails, ranked by priority";
      emailListEl.innerHTML = "";

      scoredItems.forEach(({ email, score, reasons }) => {
        const card = document.createElement("div");
        card.className = "email-card";

        const fromName = email.from?.emailAddress?.name || "Unknown sender";
        const dateStr = new Date(email.receivedDateTime).toLocaleDateString(undefined, { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
        const tag = scoreToTag(score);
        const reasonText = reasons.length > 0 ? reasons.join(" • ") : "No strong priority signals";

        card.innerHTML = `
          <div class="email-top">
            <div class="email-top-row">
              <span class="tag ${tag.cls}">${tag.label}</span>
              <span class="date">${dateStr}</span>
            </div>
            <span class="from">${escapeHtml(fromName)}</span>
          </div>
          <div class="subject">${escapeHtml(email.subject || "(no subject)")}</div>
          <div class="preview">${escapeHtml(email.bodyPreview || "")}</div>
          <div class="reason">${escapeHtml(reasonText)}</div>
        `;
        emailListEl.appendChild(card);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    // ---- 6. Restore session if already signed in ----
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      msalInstance.setActiveAccount(accounts[0]);
      onSignedIn(accounts[0]);
    }
  }
</script>
</body>
</html>
